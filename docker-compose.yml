services:
  redis:
    image: redis:7-alpine
    container_name: kontrahent-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: kontrahent-backend
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: ["npm", "run", "start:dev"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: kontrahent-frontend
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
      NEXT_PUBLIC_SITE_URL: http://localhost:${FRONTEND_PORT:-3000}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped

volumes:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
